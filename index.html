<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greetings Around the World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Greetings in Different Countries</h1>
    <label for="country-select">Choose a country:</label>
    <select id="country-select">
        <option value="">Select a country</option>
        <option value="usa">United States</option>
        <option value="france">France</option>
        <option value="japan">Japan</option>
        <option value="spain">Spain</option>
        <option value="germany">Germany</option>
        <option value="italy">Italy</option>
        <option value="china">China</option>
        <option value="india">India</option>
        <option value="brazil">Brazil</option>
        <option value="russia">Russia</option>
    </select>
    <div id="greeting-display">
        <h2 id="greeting">Select a country to see the greeting!</h2>
        <p id="fact">Fun fact will appear here.</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
